services:
  db:
    image: mysql:8.0
    container_name: shop-db-197
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shop123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_197:/var/lib/mysql
      - ./scripts/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-backend-197
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/shop?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: shop
      SPRING_DATASOURCE_PASSWORD: shop123
    ports:
      - "8197:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shop-frontend-197
    depends_on:
      - backend
    ports:
      - "3197:80"

volumes:
  mysql_data_197:
