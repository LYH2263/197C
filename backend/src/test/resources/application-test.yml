spring:
  datasource:
    url: jdbc:h2:mem:shop;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS shop
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-init-sql: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: testSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongEnough
  expiration-ms: 3600000
